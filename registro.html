<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comienza tu prueba | OnSaTech SaaS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <style>
        /* 🔥 PALETA ONSATECH */
        :root { 
            --bg: #0d0b13; 
            --surface: #161320; 
            --surface-hover: #1e1b29;
            --text: #fafafa; 
            --text-muted: #a19cb5;
            --primary: #8b5cf6; 
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            --border: #2a253a;
            --danger: #ef4444; 
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; justify-content: center; align-items: center; background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 40%); overflow: hidden; }
        
        .registro-wrapper { position: relative; width: 100%; max-width: 440px; }
        
        /* Tarjeta Contenedora Principal */
        .registro-card { background: rgba(22, 19, 32, 0.7); backdrop-filter: blur(15px); padding: 45px 40px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        
        .header-brand { background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; margin: 0 0 8px 0; font-weight: 700; letter-spacing: -1px; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; margin: 0 0 35px 0; font-size: 0.95rem; line-height: 1.5; }

        /* 🔥 SISTEMA DE PASOS ANIMADOS */
        .step { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateX(20px); pointer-events: none; position: absolute; top: 0; left: 0; right: 0; visibility: hidden; }
        .step.active { opacity: 1; transform: translateX(0); pointer-events: auto; position: relative; visibility: visible; }
        .step.previous { transform: translateX(-20px); }

        /* Controles de Formulario */
        label { display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; padding: 15px 16px; background: rgba(13, 11, 19, 0.5); border: 1px solid var(--border); color: var(--text); border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); background: var(--bg); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }
        
        /* Botones */
        .btn { padding: 15px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; font-size: 1rem; transition: transform 0.2s, background 0.2s, box-shadow 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25); }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(217, 70, 239, 0.35); }
        
        .btn-social { background: transparent; border: 1px solid var(--border); color: var(--text); margin-bottom: 12px; }
        .btn-social:hover { background: var(--surface-hover); border-color: #3f3f46; }

        /* Extras */
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--border); }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }
        .divider span { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; }

        .back-btn { position: absolute; top: 30px; left: 30px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.9rem; padding: 5px; border-radius: 6px; transition: 0.2s; z-index: 10; }
        .back-btn:hover { color: var(--text); background: var(--surface-hover); }

        .footer-link { text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-muted); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .footer-link a:hover { color: #d946ef; }
    </style>
</head>
<body>

    <div class="registro-wrapper">
        <button id="btn-back" class="back-btn hidden" onclick="irAlPaso(1)">
            <i class="ph-bold ph-arrow-left"></i> Atrás
        </button>

        <div class="registro-card">
            <h2 class="header-brand">OnSaTech</h2>
            <p id="dinamic-subtitle" class="subtitle">Despliega tu asistente IA y automatiza tus ventas. Obtén 7 días de prueba sin tarjeta.</p>

            <div id="paso-1" class="step active">
                <button class="btn btn-social" onclick="notificar('El inicio con Google se habilitará próximamente', 'info')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google"> 
                    Continuar con Google
                </button>
                <button class="btn btn-social" onclick="notificar('El inicio con Microsoft se habilitará próximamente', 'info')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" width="20" alt="Microsoft"> 
                    Continuar con Microsoft
                </button>

                <div class="divider"><span>O usa tu correo</span></div>

                <label for="reg-email">Correo electrónico de trabajo</label>
                <input type="email" id="reg-email" placeholder="hola@tuempresa.com" onkeypress="if(event.key === 'Enter') irAlPaso(2)">

                <button class="btn btn-primary" onclick="irAlPaso(2)">
                    Continuar con correo <i class="ph-bold ph-arrow-right"></i>
                </button>
            </div>

            <div id="paso-2" class="step">
                <div style="background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; padding: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
                    <i class="ph-fill ph-user-circle" style="font-size: 1.5rem; color: var(--primary);"></i>
                    <span id="display-email" style="font-size: 0.9rem; font-weight: 500;">...</span>
                </div>

                <label for="reg-password">Crea una contraseña segura</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" onkeypress="if(event.key === 'Enter') crearCuenta()">

                <button id="btn-registro" class="btn btn-primary" onclick="crearCuenta()" style="margin-top: 10px;">
                    Crear cuenta <i class="ph-bold ph-check"></i>
                </button>
            </div>

            <p class="footer-link">
                ¿Ya tienes una cuenta? <a href="/index.html">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        const notificar = (mensaje, tipo = 'info') => {
            const bg = tipo === 'success' ? '#10b981' : tipo === 'error' ? '#ef4444' : '#8b5cf6';
            Toastify({ text: mensaje, duration: 3000, gravity: "top", position: "center", style: { background: bg, borderRadius: "8px", boxShadow: "0 10px 20px rgba(0,0,0,0.3)" } }).showToast();
        };

        // 🔥 LÓGICA DEL WIZARD (Pasos animados)
        const irAlPaso = (numeroPaso) => {
            const paso1 = document.getElementById('paso-1');
            const paso2 = document.getElementById('paso-2');
            const emailInput = document.getElementById('reg-email');
            const subtitulo = document.getElementById('dinamic-subtitle');
            const btnBack = document.getElementById('btn-back');

            if (numeroPaso === 2) {
                // Validamos el correo antes de avanzar
                const emailVal = emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (!emailVal || !emailRegex.test(emailVal)) {
                    notificar("Ingresa un correo electrónico válido", "error");
                    emailInput.focus();
                    return;
                }

                // Avanzamos al Paso 2
                document.getElementById('display-email').innerText = emailVal;
                
                paso1.classList.remove('active');
                paso1.classList.add('previous');
                
                setTimeout(() => {
                    paso2.classList.add('active');
                    btnBack.classList.remove('hidden');
                    subtitulo.innerText = "Casi listo. Protege tu nueva cuenta empresarial.";
                    document.getElementById('reg-password').focus();
                }, 100);

            } else {
                // Regresamos al Paso 1
                paso2.classList.remove('active');
                
                setTimeout(() => {
                    paso1.classList.remove('previous');
                    paso1.classList.add('active');
                    btnBack.classList.add('hidden');
                    subtitulo.innerText = "Despliega tu asistente IA y automatiza tus ventas. Obtén 7 días de prueba sin tarjeta.";
                }, 100);
            }
        };

        const crearCuenta = async () => {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const btn = document.getElementById('btn-registro');

            if (password.length < 6) return notificar("La contraseña debe tener al menos 6 caracteres", "error");

            btn.innerHTML = '<i class="ph-bold ph-spinner-gap" style="animation: spin 1s linear infinite;"></i> Creando entorno...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();

                if (data.success) {
                    notificar(data.message, "success");
                    setTimeout(() => { window.location.href = '/index.html'; }, 2000);
                } else {
                    notificar(data.message, "error");
                    btn.innerHTML = 'Crear cuenta <i class="ph-bold ph-check"></i>';
                    btn.disabled = false;
                }
            } catch (e) {
                notificar("Error de red. Verifica tu conexión.", "error");
                btn.innerHTML = 'Crear cuenta <i class="ph-bold ph-check"></i>';
                btn.disabled = false;
            }
        };
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
