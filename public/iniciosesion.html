<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | OnSaTech SaaS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin-bottom: 5px;">OnSaTech</h2>
            <p style="margin-bottom: 30px; font-size: 0.95rem;">Acceso al motor de automatización</p>
            <input type="email" id="login-email" placeholder="Correo electrónico" style="margin-bottom: 15px;">
            <input type="password" id="login-password" placeholder="Contraseña" style="margin-bottom: 25px;">
            <button class="btn btn-primary" style="width: 100%;" onclick="procesarLogin()">Iniciar Sesión</button>
            
            <p style="margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
                ¿No tienes una cuenta? <a href="registro.html" style="color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#d946ef'" onmouseout="this.style.color='var(--primary)'">Regístrate gratis</a>
            </p>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="main.js"></script>
</body>
</html>
